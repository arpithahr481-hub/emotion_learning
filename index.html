<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSense - Smart Emotion Learning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      color: #e2e8f0;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.5);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .icon { font-size: 52px; display: block; margin-bottom: 8px; }
    .logo h1 { font-size: 28px; color: #4f46e5; margin-bottom: 4px; }
    .logo p { color: #94a3b8; font-size: 13px; }
    h2 { text-align: center; margin-bottom: 22px; font-size: 19px; color: #e2e8f0; }
    .form-group { margin-bottom: 14px; }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4f46e5; }
    input::placeholder { color: #64748b; }
    button.primary {
      width: 100%;
      padding: 13px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    button.primary:hover { background: #3730a3; }
    .switch { text-align: center; margin-top: 16px; font-size: 14px; color: #94a3b8; }
    .switch a { color: #4f46e5; text-decoration: none; cursor: pointer; font-weight: 600; }
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .msg.success { background: rgba(16,185,129,0.15); color: #10b981; display: block; }
    .msg.error   { background: rgba(239,68,68,0.15);  color: #ef4444;  display: block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="icon">🧠</span>
    <h1>EduSense</h1>
    <p>Smart Emotion-Based Learning</p>
  </div>

  <!-- LOGIN -->
  <div id="loginSection">
    <h2>Welcome Back</h2>
    <div class="form-group">
      <input type="email" id="loginEmail" placeholder="Email Address" />
    </div>
    <div class="form-group">
      <input type="password" id="loginPassword" placeholder="Password" />
    </div>
    <button class="primary" onclick="doLogin()">Login</button>
    <p class="switch">No account? <a onclick="show('register')">Register here</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerSection" style="display:none;">
    <h2>Create Account</h2>
    <div class="form-group">
      <input type="text" id="regName" placeholder="Full Name" />
    </div>
    <div class="form-group">
      <input type="email" id="regEmail" placeholder="Email Address" />
    </div>
    <div class="form-group">
      <input type="password" id="regPassword" placeholder="Password (min 4 chars)" />
    </div>
    <button class="primary" onclick="doRegister()">Register</button>
    <p class="switch">Have an account? <a onclick="show('login')">Login here</a></p>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
  function show(section) {
    document.getElementById('loginSection').style.display    = section === 'login'    ? 'block' : 'none';
    document.getElementById('registerSection').style.display = section === 'register' ? 'block' : 'none';
    document.getElementById('msg').className = 'msg';
    document.getElementById('msg').textContent = '';
  }

  function flash(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function getUsers() {
    return JSON.parse(localStorage.getItem('edu_users') || '[]');
  }

  function doRegister() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (!name)            return flash('Please enter your name.', 'error');
    if (!email.includes('@')) return flash('Enter a valid email.', 'error');
    if (password.length < 4)  return flash('Password must be at least 4 characters.', 'error');

    const users = getUsers();
    if (users.find(u => u.email === email)) return flash('Email already registered. Please login.', 'error');

    users.push({ name, email, password });
    localStorage.setItem('edu_users', JSON.stringify(users));

    flash('✅ Registered! Switching to login...', 'success');
    document.getElementById('regName').value = '';
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    setTimeout(() => show('login'), 1800);
  }

  function doLogin() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) return flash('Please fill both fields.', 'error');

    const users = getUsers();
    const user  = users.find(u => u.email === email && u.password === password);

    if (user) {
      localStorage.setItem('current_user', JSON.stringify({ name: user.name, email }));
      flash('✅ Login successful! Loading dashboard...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else if (users.length === 0) {
      // Demo mode — no users registered yet
      localStorage.setItem('current_user', JSON.stringify({ name: 'Student', email }));
      flash('✅ Demo login! Loading dashboard...', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } else {
      flash('❌ Wrong email or password.', 'error');
    }
  }
</script>
</body>
</html>
